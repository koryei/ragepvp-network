<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RagePvP — Offline</title>
    <meta name="description" content="RagePvP is no longer operating.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:       #050505;
            --bg-card:       #111111;
            --border-subtle: rgba(255,255,255,0.07);
            --text-primary:  #ffffff;
            --text-secondary:#a0a0a0;
            --text-tertiary: #606060;
            --accent:        #dc2626;
            --accent-muted:  rgba(220,38,38,0.18);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle radial glow behind content */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 40%, rgba(220,38,38,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 100% 80% at 50% 100%, rgba(0,0,0,0.6) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Faint grid texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            max-width: 640px;
            width: 100%;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            height: 52px;
            width: auto;
            margin-bottom: 32px;
            opacity: 0.9;
        }

        /* OFFLINE badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 999px;
            background: var(--accent-muted);
            border: 1px solid rgba(220,38,38,0.35);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #f87171;
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #dc2626;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.75); }
        }

        h1 {
            font-size: clamp(1.9rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.15;
            color: var(--text-primary);
            margin-bottom: 18px;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            margin: 0 auto 20px;
            opacity: 0.6;
        }

        .notice {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 480px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
        }

        .notice strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
            padding: 18px 24px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border-subtle);
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="images/ragepvp_logo.png" alt="RagePvP Network" class="logo">

        <div class="badge">
            <span class="badge-dot"></span>
            Permanently Offline
        </div>

        <h1>RagePvP is no longer operating.</h1>

        <div class="divider"></div>

        <p class="notice">
            <strong>Official Notice:</strong> Any projects using the RagePvP name or branding
            are <strong>not affiliated</strong> with this official domain.
            This server has permanently shut down and will not return.
        </p>
    </div>

    <footer>
        &copy; RagePvP Network &mdash; All rights reserved.
    </footer>

</body>
</html>
